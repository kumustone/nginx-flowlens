worker_processes  1;

events {
    worker_connections  1024;
}

http {
    inspect off;
    inspect_log /opt/nginx-audit/logs/inspect.log;
    inspect_max_body_size 5m;

    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       18091;
        server_name  localhost;

        location / {
            root   html;
            index  index.html index.htm;
        }
    }
}
